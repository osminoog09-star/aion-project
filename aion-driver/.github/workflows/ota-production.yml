# Stable OTA: только вручную (Actions → Run workflow). Канал production.
# Опционально: в GitHub Settings → Environments → production включите Required reviewers
# для «manual approve» перед запуском job.
name: OTA Production (stable channel)

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Краткое сообщение релиза (дополняется changelog из git)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_OPTIONS: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate (typecheck + expo-doctor)
        run: npm run validate

      - name: Setup EAS
        if: ${{ secrets.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (channel production)
        if: ${{ secrets.EXPO_TOKEN != '' }}
        env:
          EXPO_PUBLIC_GIT_COMMIT: ${{ github.sha }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          SUBJECT="$(git log -1 --pretty='format:%s (%h)' | head -c 400)"
          RECENT="$(git log -12 --pretty='format:- %s (%h)' | head -c 2000)"
          if [ -n "$INPUT_MESSAGE" ]; then
            HEAD="$INPUT_MESSAGE"
          else
            HEAD="${SUBJECT}"
          fi
          MSG="[production] ${HEAD}"$'\n\n'"Changelog:"$'\n'"${RECENT}"
          npx eas-cli@latest update --channel production --message "${MSG}" --non-interactive

      - name: Job summary
        if: ${{ success() && secrets.EXPO_TOKEN != '' }}
        run: |
          echo "## OTA Production опубликован" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | \`production\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice
        if: ${{ secrets.EXPO_TOKEN == '' }}
        run: |
          echo "EXPO_TOKEN не задан — OTA не опубликован."
          echo "## Пропуск" >> "$GITHUB_STEP_SUMMARY"
          echo "Добавьте секрет \`EXPO_TOKEN\`." >> "$GITHUB_STEP_SUMMARY"
