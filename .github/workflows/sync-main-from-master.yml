# Keep Vercel production branch (main) aligned with integration branch (master).
name: Sync main from master

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward main to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main master
          if git rev-parse origin/main >/dev/null 2>&1; then
            git checkout main
            git merge --ff-only origin/master || git merge origin/master -m "chore: sync main from master"
          else
            git checkout -b main origin/master
          fi
          git push origin main
