# EAS preview APK — модуль aion-driver внутри проекта AION (монорепо).
# Требует: EXPO_TOKEN в secrets, в репозитории есть папка aion-driver/
name: EAS Build Driver (preview)

on:
  workflow_dispatch:

env:
  AION_DRIVER_MODULE: ${{ vars.AION_DRIVER_MODULE || 'aion-driver' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.eas_build.outputs.build_id }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout AION project
        uses: actions/checkout@v4

      - name: Verify Driver module exists
        run: |
          if [ ! -f "${{ env.AION_DRIVER_MODULE }}/package.json" ]; then
            echo "::error::Module ${{ env.AION_DRIVER_MODULE }}/ not in repo."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.AION_DRIVER_MODULE }}/package-lock.json

      - name: Generate build manifest
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npm ci && npm run build:manifest

      - name: Validate
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npm run validate

      - name: Setup EAS
        if: ${{ env.EXPO_TOKEN != '' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: EAS Build preview APK
        id: eas_build
        if: ${{ env.EXPO_TOKEN != '' }}
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: |
          set -e
          npx eas-cli@latest build -p android --profile preview --non-interactive --no-wait --json > ../eas-build.json
          node -e "
            const fs=require('fs');
            const d=JSON.parse(fs.readFileSync('../eas-build.json','utf8').trim());
            const b=Array.isArray(d)?d[0]:d;
            if(!b?.id) throw new Error('No EAS build id');
            fs.writeFileSync('../build-id.txt', b.id);
            console.log('build_id='+b.id);
          "
          echo "build_id=$(cat ../build-id.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload metadata
        if: ${{ env.EXPO_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: eas-preview-build-metadata
          path: |
            eas-build.json
            build-id.txt

  sync-manifest:
    needs: build
    if: ${{ needs.build.outputs.build_id != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Wait FINISHED and sync apk-manifest.preview.json
        run: node scripts/complete-apk-loop.mjs "${{ needs.build.outputs.build_id }}"

      - name: Commit manifest (enables in-app update notification)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/apk-manifest.preview.json
          if git diff --staged --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git commit -m "chore(release): sync preview APK manifest (${{ needs.build.outputs.build_id }})"
          git push
