# OTA preview для aion-driver (канал preview, runtime 1.0.6)
name: Driver OTA Preview

on:
  push:
    branches: [master, preview, preview-ota]
    paths:
      - "aion-driver/**"
      - ".github/workflows/driver-ota-preview.yml"
  workflow_dispatch:

concurrency:
  group: driver-ota-preview
  cancel-in-progress: true

env:
  AION_DRIVER_MODULE: aion-driver

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.AION_DRIVER_MODULE }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npm ci

      - name: Validate
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npm run validate

      - name: Verify Expo config (EAS reads app.config)
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npx expo config --json --type public > /dev/null

      - uses: expo/expo-github-action@v8
        if: ${{ env.EXPO_TOKEN != '' }}
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: EAS whoami
        if: ${{ env.EXPO_TOKEN != '' }}
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        run: npx eas-cli@latest whoami

      - name: EAS Update (channel preview)
        if: ${{ env.EXPO_TOKEN != '' }}
        working-directory: ${{ env.AION_DRIVER_MODULE }}
        env:
          EXPO_PUBLIC_GIT_COMMIT: ${{ github.sha }}
          EXPO_PUBLIC_AION_PORTAL_URL: https://aion-com.vercel.app
          EXPO_PUBLIC_SUPABASE_URL: https://eclrkusmwcrtnxqhzpky.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbHJrdXNtd2NydG54cWh6cGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDU3ODEsImV4cCI6MjA5MTU4MTc4MX0.FpTqRxDFBToOCyfjJCOj2NvOwTol__4qGDgLp6Q8JUg
        run: |
          npx eas-cli@latest update --channel preview --message "OTA auth cloud EUR fuel" --non-interactive

      - name: Job summary
        if: ${{ success() && env.EXPO_TOKEN != '' }}
        run: |
          echo "## OTA Preview опубликован" >> "$GITHUB_STEP_SUMMARY"
          echo "Канал: \`preview\` · commit \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "На телефоне: **Настройки → Центр обновлений** → проверить OTA → перезапуск Driver." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail — no EXPO_TOKEN
        if: ${{ env.EXPO_TOKEN == '' }}
        run: echo "::error::EXPO_TOKEN missing in repository secrets" && exit 1
