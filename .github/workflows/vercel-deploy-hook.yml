# Triggers Vercel production via Deploy Hook (no VERCEL_TOKEN).
# GitHub secret: VERCEL_DEPLOY_HOOK = full URL from Vercel → Settings → Git → Deploy Hooks → Production

name: Vercel deploy hook

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  trigger-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: POST deploy hook and validate
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not configured — skip."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"
          echo "Deploy hook triggered; waiting 90s..."
          sleep 90
          node scripts/post-deploy-validate.mjs --base https://aion-com.vercel.app || true
