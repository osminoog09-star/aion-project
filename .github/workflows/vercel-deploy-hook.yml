# Triggers Vercel production via Deploy Hook (no VERCEL_TOKEN).
# GitHub secret: VERCEL_DEPLOY_HOOK = full URL from Vercel → Settings → Git → Deploy Hooks → Production

name: Vercel deploy hook

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  trigger-production:
    runs-on: ubuntu-latest
    steps:
      - name: POST production deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK not configured — skip (add secret to enable autonomous deploy)."
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Deploy hook triggered."

      - name: Wait for propagation
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: sleep 90

      - uses: actions/checkout@v4
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}

      - uses: actions/setup-node@v4
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        with:
          node-version: "20"

      - name: Validate production routes
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: node scripts/post-deploy-validate.mjs --base https://aion-com.vercel.app
        continue-on-error: true
