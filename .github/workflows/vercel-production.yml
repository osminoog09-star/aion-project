# Production deploy via VERCEL_TOKEN (GitHub secrets).
# Required: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Vercel production deploy

on:
  workflow_dispatch:
  push:
    branches: [master, main]

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  NEXT_PUBLIC_SUPABASE_URL: https://eclrkusmwcrtnxqhzpky.supabase.co
  # Public anon key (client-safe); enables Supabase heartbeat read/write on Vercel without service role.
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbHJrdXNtd2NydG54cWh6cGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDU3ODEsImV4cCI6MjA5MTU4MTc4MX0.FpTqRxDFBToOCyfjJCOj2NvOwTol__4qGDgLp6Q8JUg

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check credentials
        id: creds
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN not set — skip token deploy (use vercel-deploy-hook.yml or Vercel Git)."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Build
        if: steps.creds.outputs.configured == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build
          node scripts/verify-app-routes.mjs

      - name: Sync Supabase env to Vercel project
        if: steps.creds.outputs.configured == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          add_env() {
            printf '%s' "$2" | npx --yes vercel@54 env add "$1" production --force --token="${{ secrets.VERCEL_TOKEN }}"
          }
          add_env NEXT_PUBLIC_SUPABASE_URL "${{ env.NEXT_PUBLIC_SUPABASE_URL }}"
          add_env NEXT_PUBLIC_SUPABASE_ANON_KEY "${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"

      - name: Deploy to Vercel Production
        if: steps.creds.outputs.configured == 'true'
        run: npx --yes vercel@54 deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Wait for alias propagation
        if: steps.creds.outputs.configured == 'true'
        run: sleep 60

      - name: Post-deploy route validation
        if: steps.creds.outputs.configured == 'true'
        run: node scripts/post-deploy-validate.mjs --base https://aion-com.vercel.app

      - name: Record deploy in implementation feed
        if: success() && steps.creds.outputs.configured == 'true'
        run: |
          node scripts/append-implementation-feed.mjs \
            --title "Production deploy succeeded" \
            --summary "Vercel production deploy + operations routes validated (${{ github.sha }})" \
            --event-type implementation_finished \
            --repo aion-project \
            --confidence high \
            --subsystems operations-center,web-portal

      - name: Record deploy failure in feed
        if: failure() && steps.creds.outputs.configured == 'true'
        run: |
          node scripts/append-implementation-feed.mjs \
            --title "Production deploy FAILED" \
            --summary "Vercel deploy or route validation failed (${{ github.sha }})" \
            --event-type validation_failed \
            --repo aion-project \
            --confidence blocked \
            --subsystems operations-center,web-portal

      - name: Commit deployment status (bot)
        if: success() && steps.creds.outputs.configured == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/deployment-status.json src/content/ecosystem-implementation-feed.json || true
          git diff --staged --quiet || git commit -m "chore(deploy): update production deployment status [skip ci]"
          git push || echo "Push skipped"
